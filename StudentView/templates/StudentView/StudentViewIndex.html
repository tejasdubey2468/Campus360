{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Attendance Portal</title>
    <link rel="stylesheet" href="{% static 'StudentView/Index_Style.css' %}" />
  </head>
  <body>
    <header class="header">
      <h1 class="header-title">Inderprastha Engineering College</h1>
      <h2>Attendance Portal</h2>
    </header>

    <div class="container">
      <section class="attendance-section">
        <h2 class="section-title">Mark Your Attendance</h2>
        <form
          class="attendance-form"
          method="POST"
          action="{% url 'student_add_manually_post' %}"
        >
          {% csrf_token %}
          {% if error %}
          <div class="error-message">{{ error }}</div>
          {% endif %}
          <div class="form-group">
            <label for="student-roll">Enter Your Roll Number:</label>
            <input
              type="text"
              id="student-roll"
              name="student-name"
              class="roll-input"
              placeholder="e.g., 101, 102, etc."
              required
            />
          </div>
          <button type="submit" class="submit-button">Mark Present</button>
        </form>
      </section>
    </div>

    <footer class="footer">
      <p>&copy; QR Attendance System 2023 - Team Hokage</p>
    </footer>
  </body>
</html>
