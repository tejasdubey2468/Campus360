<!-- scheduler/templates/scheduler/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Timetable Generator{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .timetable-cell {
            min-height: 80px;
            font-size: 0.85rem;
            vertical-align: top;
        }
        .lab-session {
            background-color: #e7f3ff;
        }
        .theory-session {
            background-color: #f0fff0;
        }
        .empty-slot {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }
        .sidebar a {
            color: #adb5bd;
        }
        .sidebar a:hover {
            color: #fff;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block sidebar py-3">
                <div class="text-center mb-4">
                    <h5 class="text-white">Timetable System</h5>
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'generate_timetable_dashboard' %}">
                            <i class="bi bi-plus-circle"></i> Generate Timetable
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'view_timetable_dashboard' %}">
                            <i class="bi bi-calendar-check"></i> View Timetables
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'admin:index' %}">
                            <i class="bi bi-shield-lock"></i> Admin Panel
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4 py-3">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
                
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js)"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
